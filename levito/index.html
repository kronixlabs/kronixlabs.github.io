<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Levito | MES System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: radial-gradient(circle at 20% 20%, #1f1f3a, #0d0d1a 60%);
    font-family: 'Segoe UI', sans-serif;
    color: #ffffff;
}

.navbar {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding: 15px 30px;
}

.header-title {
    font-weight: 600;
    letter-spacing: 1px;
    background: linear-gradient(90deg,#4facfe,#00f2fe);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.panel-box {
    background: rgba(255,255,255,0.04);
    border-radius: 20px;
    padding: 30px;
    backdrop-filter: blur(12px);
    box-shadow: 0 0 30px rgba(0,0,0,0.4);
}

.lote-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 25px;
    margin-top: 30px;
}

.lote-card {
    height: 170px;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.3s;
    font-weight: 600;
    background: linear-gradient(135deg,#141E30,#243B55);
    border: 1px solid rgba(255,255,255,0.08);
}

.lote-card:hover {
    transform: translateY(-8px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.6);
}

.modal-content {
    background: #111124;
    color: white;
    border-radius: 20px;
}

.form-control, .form-select {
    background: #1e1e38;
    border: 1px solid rgba(255,255,255,0.1);
    color: white;
}

.btn-primary {
    background: linear-gradient(90deg,#4facfe,#00f2fe);
    border: none;
    font-weight: 600;
}
</style>
</head>

<body>

<nav class="navbar d-flex justify-content-between align-items-center">
    <h4 class="header-title">LEVITO • SISTEMA MES INDUSTRIAL</h4>
</nav>

<div class="container mt-5">
    <div class="panel-box text-center">
        <h5>PANEL DE LOTES ACTIVOS</h5>
        <small style="opacity:.6">Seleccione el lote físico disponible</small>

        <div class="lote-container">
            <div class="lote-card" onclick="abrirModal('LOTE_1')">
                <h3>LOTE 1</h3>
                <span>LIBRE</span>
            </div>

            <div class="lote-card" onclick="abrirModal('LOTE_2')">
                <h3>LOTE 2</h3>
                <span>LIBRE</span>
            </div>

            <div class="lote-card" onclick="abrirModal('LOTE_3')">
                <h3>LOTE 3</h3>
                <span>LIBRE</span>
            </div>

            <div class="lote-card" onclick="abrirModal('LOTE_4')">
                <h3>LOTE 4</h3>
                <span>LIBRE</span>
            </div>
        </div>
    </div>
</div>

<!-- Modal -->
<div class="modal fade" id="modalLote">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title" id="tituloLote">Nuevo Lote</h5>
<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<form id="formLote">

<div class="mb-3">
<label>PIN Operario</label>
<input type="password" id="operarioPin" class="form-control" required>
</div>

<div class="mb-3">
<label>Producto</label>
<select id="prodId" class="form-select">
<option value="BRIO-MINI-A">Pan Brioche Mini</option>
</select>
</div>

<hr>
<p class="small text-center" style="opacity:.6">
Se generará automáticamente el ID de auditoría.
</p>

<button type="submit" class="btn btn-primary w-100">
INICIAR PRODUCCIÓN
</button>

</form>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const API_URL = "PEGA_AQUI_TU_URL_EXEC";
let loteActivo = "";

function abrirModal(lote) {
    loteActivo = lote;
    document.getElementById('tituloLote').innerText =
        lote.replace("_"," ") + " • Nuevo Proceso";
    new bootstrap.Modal(document.getElementById('modalLote')).show();
}

document.getElementById('formLote').onsubmit = async (e) => {
    e.preventDefault();
    const pin = document.getElementById('operarioPin').value;

    const data = {
        action: "INICIAR_MOJADO",
        pin: pin,
        color_pin: loteActivo,   // sigue funcionando con el backend
        producto_id: "BRIO-MINI-A",
        empaque: "Flowpack",
        fecha_venc: "2026-03-15"
    };

    try {
        const res = await fetch(API_URL, {
            method: 'POST',
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });

        const result = await res.json();

        if(result.status === "ok") {
            alert("Lote creado: " + result.id_lote_unico);
            location.reload();
        } else {
            alert("Error: " + result.message);
        }

    } catch (e) {
        alert("Error de conexión con el servidor.");
    }
};
</script>

</body>
</html>
