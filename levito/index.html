<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>KRONIX LABS | LEVITO MES</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
background:#020617;
color:white;
font-family:system-ui;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
border-bottom:1px solid #1e293b;
}

.logo{
font-size:18px;
font-weight:700;
}

.logo span{
color:#38bdf8;
}

.tabs{
display:flex;
gap:10px;
padding:15px 25px;
border-bottom:1px solid #1e293b;
}

.tab{
padding:8px 16px;
border-radius:8px;
cursor:pointer;
background:#0f172a;
border:1px solid #1e293b;
}

.tab.active{
background:#1e293b;
border-color:#38bdf8;
}

.section{
display:none;
padding:25px;
}

.section.active{
display:block;
}

.grid-lotes{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(230px,1fr));
gap:18px;
}

.lote-card{
background:#0f172a;
border:1px solid #1e293b;
border-radius:14px;
padding:18px;
transition:.2s;
cursor:pointer;
}

.lote-card:hover{
border-color:#38bdf8;
transform:translateY(-3px);
}

.lote-title{
font-weight:700;
font-size:17px;
}

.producto{
font-size:13px;
color:#94a3b8;
}

.etapa{
font-weight:600;
margin-top:8px;
}

.operario{
font-size:12px;
color:#cbd5e1;
}

.tiempo{
font-size:12px;
color:#94a3b8;
margin-bottom:10px;
}

.progreso{
font-size:18px;
letter-spacing:4px;
}

.done{color:#22c55e;}
.active-step{color:#4ade80;}
.pending{color:#475569;}

.table{
color:white;
}

input,select{
background:#0f172a!important;
color:white!important;
border:1px solid #1e293b!important;
}

</style>

</head>

<body>

<div class="header">

<div class="logo">
KRONIX <span>LABS</span>
</div>

<div>
LEVITO MES
</div>

</div>


<div class="tabs">

<div class="tab active" onclick="showTab('produccion', this)">
Producción
</div>

<div class="tab" onclick="showTab('despacho', this)">
Despacho
</div>

<div class="tab" onclick="showTab('entrega', this)">
Entrega
</div>

</div>


<!-- ====================== PRODUCCION ====================== -->

<div id="produccion" class="section active">

<h5 class="mb-4">Panel Operativo de Producción</h5>

<div id="grid" class="grid-lotes"></div>

</div>


<!-- ====================== DESPACHO ====================== -->

<div id="despacho" class="section">

<h5 class="mb-4">Registro de Despachos</h5>

<div class="row g-3 mb-3">

<div class="col-md-3">
<label>Fecha</label>
<input type="date" id="d_fecha" class="form-control">
</div>

<div class="col-md-3">
<label>Producto</label>
<input type="text" id="d_producto" class="form-control">
</div>

<div class="col-md-3">
<label>Lote</label>
<input type="text" id="d_lote" class="form-control">
</div>

<div class="col-md-3">
<label>Cantidad</label>
<input type="number" id="d_cantidad" class="form-control">
</div>

</div>

<button class="btn btn-primary" onclick="registrarDespacho()">
Registrar despacho
</button>

</div>


<!-- ====================== ENTREGA ====================== -->

<div id="entrega" class="section">

<h5 class="mb-4">Registro de Entregas</h5>

<div class="row g-3 mb-3">

<div class="col-md-3">
<label>Fecha</label>
<input type="date" id="e_fecha" class="form-control">
</div>

<div class="col-md-3">
<label>Producto</label>
<input type="text" id="e_producto" class="form-control">
</div>

<div class="col-md-3">
<label>Lote</label>
<input type="text" id="e_lote" class="form-control">
</div>

<div class="col-md-3">
<label>Cliente</label>
<input type="text" id="e_cliente" class="form-control">
</div>

<div class="col-md-3">
<label>Cantidad</label>
<input type="number" id="e_cantidad" class="form-control">
</div>

</div>

<button class="btn btn-success" onclick="registrarEntrega()">
Registrar entrega
</button>

</div>



<script>

const API="https://script.google.com/macros/s/AKfycbw1OjS5q0EndaP7ZKqr2bq6YbeUn4Lr0Yp4xAaqDyiJSyB_srAZ2udtajpPcUk3WOZd/exec";

const ETAPAS=[
"Mojado",
"Porcionado",
"Levado",
"Decorado",
"Horneado",
"Enfriado",
"Empaque"
];

function showTab(id,el){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
el.classList.add("active");

document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
document.getElementById(id).classList.add("active");

}

async function cargarLotes(){

const res=await fetch(API+"?action=GET_ALL_ACTIVOS");
const data=await res.json();

render(data);

}

function render(lotes){

const grid=document.getElementById("grid");
grid.innerHTML="";

for(let i=1;i<=7;i++){

let lote=lotes.find(l=>parseInt(l.slot)==i);

if(!lote){

grid.innerHTML+=`
<div class="lote-card">

<div class="lote-title">LOTE ${i}</div>

<div class="producto">
Disponible
</div>

<div class="progreso">
<span class="pending">○ ○ ○ ○ ○ ○ ○</span>
</div>

</div>
`;

}else{

grid.innerHTML+=crearLote(lote);

}

}

}

function crearLote(lote){

let index=ETAPAS.indexOf(lote.etapa_actual);

let progreso="";

ETAPAS.forEach((e,i)=>{

if(i<index)
progreso+='<span class="done">●</span> ';

else if(i==index)
progreso+='<span class="active-step">●</span> ';

else
progreso+='<span class="pending">○</span> ';

});

return`

<div class="lote-card">

<div class="lote-title">
LOTE ${lote.slot}
</div>

<div class="producto">
${lote.producto}
</div>

<div class="etapa">
${lote.etapa_actual}
</div>

<div class="operario">
${lote.operario}
</div>

<div class="tiempo">
${lote.tiempo_etapa}
</div>

<div class="progreso">
${progreso}
</div>

</div>

`;

}


function registrarDespacho(){
const fecha=document.getElementById("d_fecha").value;
const producto=document.getElementById("d_producto").value.trim();
const id_lote=document.getElementById("d_lote").value.trim();
const cantidad=parseFloat(document.getElementById("d_cantidad").value);

if(!fecha||!producto||!id_lote||!Number.isFinite(cantidad)||cantidad<=0){
alert("Completa los datos de despacho correctamente.");
return;
}

const pin=prompt("Ingresa PIN de operario:");
if(!pin) return;

postAction({
action:"REGISTRAR_DESPACHO",
pin:pin.trim(),
fecha,
producto,
id_lote,
cantidad
});

}

function registrarEntrega(){
const fecha=document.getElementById("e_fecha").value;
const producto=document.getElementById("e_producto").value.trim();
const id_lote=document.getElementById("e_lote").value.trim();
const cliente=document.getElementById("e_cliente").value.trim();
const cantidad=parseFloat(document.getElementById("e_cantidad").value);

if(!fecha||!producto||!id_lote||!cliente||!Number.isFinite(cantidad)||cantidad<=0){
alert("Completa los datos de entrega correctamente.");
return;
}

const pin=prompt("Ingresa PIN de operario:");
if(!pin) return;

postAction({
action:"REGISTRAR_ENTREGA",
pin:pin.trim(),
fecha,
producto,
id_lote,
cliente,
cantidad
});

}

async function postAction(payload){
try{
const res=await fetch(API,{
method:"POST",
headers:{"Content-Type":"application/json"},
body:JSON.stringify(payload)
});
const data=await res.json();

if(data.status==="error"){
alert(data.message||"Error en la operación.");
return;
}

alert(data.message||"Operación registrada.");
limpiarFormulario(payload.action);
}catch(err){
alert("No se pudo conectar con la API.");
console.error(err);
}
}

function limpiarFormulario(action){
if(action==="REGISTRAR_DESPACHO"){
document.getElementById("d_producto").value="";
document.getElementById("d_lote").value="";
document.getElementById("d_cantidad").value="";
return;
}

if(action==="REGISTRAR_ENTREGA"){
document.getElementById("e_producto").value="";
document.getElementById("e_lote").value="";
document.getElementById("e_cliente").value="";
document.getElementById("e_cantidad").value="";
}
}


cargarLotes();

setInterval(cargarLotes,15000);

const hoy=new Date().toISOString().slice(0,10);
document.getElementById("d_fecha").value=hoy;
document.getElementById("e_fecha").value=hoy;

</script>

</body>
</html>
