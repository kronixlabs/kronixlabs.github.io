<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVITO MES | Kronix Labs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: radial-gradient(circle at 20% 20%, #0f172a, #020617 70%);
            font-family: 'Segoe UI', sans-serif;
            color: white;
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(10px);
            padding: 15px 30px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .brand-title {
            font-weight: 600;
            letter-spacing: 1px;
            color: #38bdf8;
        }

        /* PANEL */
        .panel-box {
            background: rgba(255,255,255,0.04);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 0 40px rgba(0,0,0,0.4);
        }

        /* CARDS DE LOTES */
        .lote-card {
            width: 150px;
            height: 160px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: .3s;
            border: 1px solid rgba(255,255,255,0.08);
        }

        .lote-card:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-4px);
        }

        .indicador {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            margin-bottom: 8px;
        }

        .gris { background: #64748b; }
        .verde { background: #22c55e; box-shadow: 0 0 10px #22c55e; }

        .lote-num { font-size: 16px; font-weight: 600; }
        .etapa-texto { font-size: 12px; opacity: .8; text-align: center; margin-top: 4px; }

        /* MODAL */
        .modal-content {
            background: #0f172a;
            color: white;
            border-radius: 20px;
            border: 1px solid #38bdf8;
        }

        .modal-header { border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .form-control, .form-select {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            font-size: 0.9rem;
        }

        .form-control:focus {
            background: rgba(255,255,255,0.1);
            color: white;
            border-color: #38bdf8;
            box-shadow: none;
        }

        /* SECCIÓN MATERIA PRIMA */
        .scroll-trazabilidad {
            max-height: 400px;
            overflow-y: auto;
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 10px;
            margin-top: 10px;
        }

        .ingrediente-row {
            border-bottom: 1px solid rgba(255,255,255,0.05);
            padding-bottom: 10px;
            margin-bottom: 10px;
        }

        .ingrediente-label {
            font-size: 0.75rem;
            color: #38bdf8;
            text-transform: uppercase;
            font-weight: bold;
        }

        .btn-primary {
            background: linear-gradient(90deg,#2563eb,#38bdf8);
            border: none;
            font-weight: bold;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

<nav class="navbar d-flex justify-content-between align-items-center">
    <div class="brand-title">KRONIX LABS • LEVITO MES</div>
    <div id="estadoConexion" class="small opacity-50">Sincronizado ✓</div>
</nav>

<div class="container mt-5">
    <div class="panel-box">
        <h5 class="mb-4">Panel Operativo de Trazabilidad</h5>
        <div id="contenedorLotes" class="d-flex flex-wrap gap-4 justify-content-center">
            </div>
    </div>
</div>

<div class="modal fade" id="modalLote" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content shadow-lg">
            <div class="modal-header">
                <h5 class="modal-title" id="tituloLote">Registro de Mojado</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formLote">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label small">PIN Operario</label>
                            <input type="password" id="operarioPin" class="form-control" placeholder="****" required>
                        </div>
                        <div class="col-md-8 mb-3">
                            <label class="form-label small">Producto a Fabricar</label>
                            <select id="productoId" class="form-select">
                                <option value="0903-1">Pan Brioche Mini (Fórmula 0903-1)</option>
                            </select>
                        </div>
                    </div>

                    <h6 class="mt-3 text-info">Trazabilidad de Materias Primas (Mojado)</h6>
                    <p class="text-muted small">Ingrese el número de lote y fecha de vencimiento de cada ingrediente:</p>
                    
                    <div class="scroll-trazabilidad" id="listaIngredientes">
                        </div>

                    <button type="submit" class="btn btn-primary w-100 mt-4 p-3">
                        REGISTRAR MOJADO E INICIAR TRAZABILIDAD
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxzwEIGecOp_bo-1PdzEqrrcPmLXiZwpC0y6QEuSKjb7JmjIMggoObhw3NSshCIC02b/exec";
    
    // Lista de los 15 ingredientes de la fórmula Pan Brioche Mini
    const ingredientes = [
        "Harina", "Agua", "Azúcar", "Grasa", "Huevo", 
        "Leche en Polvo", "Levadura", "Sal", "Esencia Mantequilla", 
        "Propionato Calcio", "Dimodan", "Ácido Acético", 
        "9740 (Aditivo)", "7200 (Aditivo)", "Color Amarillo"
    ];

    let modal;
    let loteSeleccionado = "";

    document.addEventListener("DOMContentLoaded", function() {
        modal = new bootstrap.Modal(document.getElementById('modalLote'));
        dibujarLotes();
        cargarFormularioIngredientes();
    });

    function dibujarLotes() {
        const contenedor = document.getElementById("contenedorLotes");
        for (let i = 1; i <= 8; i++) {
            contenedor.innerHTML += `
                <div class="lote-card" onclick="abrirModal('LOTE_${i}')">
                    <div class="indicador gris"></div>
                    <div class="lote-num">LOTE ${i}</div>
                    <div class="etapa-texto">No iniciado</div>
                </div>
            `;
        }
    }

    function cargarFormularioIngredientes() {
        const lista = document.getElementById("listaIngredientes");
        ingredientes.forEach(ing => {
            const idLimpio = ing.toLowerCase().replace(/ /g, "_").replace(/[()]/g, "");
            lista.innerHTML += `
                <div class="ingrediente-row row align-items-center">
                    <div class="col-md-4">
                        <span class="ingrediente-label">${ing}</span>
                    </div>
                    <div class="col-md-4">
                        <input type="text" class="form-control form-control-sm mp-lote" data-ing="${ing}" placeholder="Lote Materia Prima" required>
                    </div>
                    <div class="col-md-4">
                        <input type="date" class="form-control form-control-sm mp-vence" data-ing="${ing}" required>
                    </div>
                </div>
            `;
        });
    }

    function abrirModal(lote) {
        loteSeleccionado = lote;
        document.getElementById("tituloLote").innerText = "Registro Mojado: " + lote.replace("_", " ");
        modal.show();
    }

    document.getElementById("formLote").addEventListener("submit", async function(e) {
        e.preventDefault();

        // Recolectar trazabilidad de los 15 ingredientes
        const materiasPrimas = {};
        const lotesInput = document.querySelectorAll(".mp-lote");
        const venceInput = document.querySelectorAll(".mp-vence");

        lotesInput.forEach((input, index) => {
            const nombreIng = input.getAttribute("data-ing");
            materiasPrimas[nombreIng] = {
                lote: input.value,
                vence: venceInput[index].value
            };
        });

        const payload = {
            action: "INICIAR_MOJADO",
            pin: document.getElementById("operarioPin").value,
            color_pin: loteSeleccionado,
            producto_id: document.getElementById("productoId").value,
            materias_primas: materiasPrimas
        };

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify(payload)
            });
            const result = await res.json();

            if (result.status === "ok") {
                alert("¡LOTE INICIADO! Trazabilidad de materia prima guardada en Google Sheets.");
                modal.hide();
                location.reload();
            } else {
                alert("Error: " + result.message);
            }
        } catch (error) {
            alert("Error de conexión. El comando fue enviado, verifica el Sheet.");
        }
    });
</script>

</body>
</html>
