<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Levito | Control de Producción</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background-color: #f4f7f6; font-family: 'Segoe UI', sans-serif; }
.navbar { background: white; border-bottom: 3px solid #e67e22; padding: 10px 20px; }
.logo-kronix { height: 40px; }
.logo-levito { height: 60px; }
.header-title { font-weight: bold; color: #2c3e50; margin: 0; }

.pin-container {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
gap: 20px;
padding: 20px;
}

.pin-card {
height: 160px;
border-radius: 20px;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
color: white;
cursor: pointer;
transition: 0.3s;
border: none;
box-shadow: 0 4px 15px rgba(0,0,0,0.1);
}

.pin-card:hover {
transform: translateY(-5px);
box-shadow: 0 8px 25px rgba(0,0,0,0.2);
}

.ocupado {
opacity: 0.7;
}

/* Colores */
.rojo { background: linear-gradient(145deg, #ff4b2b, #ff416c); }
.azul { background: linear-gradient(145deg, #2193b0, #6dd5ed); }
.verde { background: linear-gradient(145deg, #11998e, #38ef7d); }
.amarillo { background: linear-gradient(145deg, #fbb034, #ffdd00); color: #333; }
.blanco { background: #ffffff; color: #333; border: 1px solid #ddd; }
.negro { background: #232526; }
.naranja { background: linear-gradient(145deg, #f12711, #f5af19); }
.morado { background: linear-gradient(145deg, #8e2de2, #4a00e0); }
</style>
</head>

<body>

<nav class="navbar d-flex justify-content-between align-items-center">
<img src="https://raw.githubusercontent.com/kronixlabs/kronixlabs.github.io/main/logo-kronix.png" class="logo-kronix">
<h3 class="header-title">LEVITO - MES SYSTEM</h3>
<img src="https://raw.githubusercontent.com/kronixlabs/kronixlabs.github.io/main/logo-levito.png" class="logo-levito">
</nav>

<div class="container mt-4">
<div class="alert alert-dark text-center">PANEL DE CONTROL DE LOTES</div>

<div class="pin-container">

<div class="pin-card rojo" id="Rojo" onclick="abrirModal('Rojo')">
<h3>Rojo</h3>
<span class="estado">LIBRE</span>
</div>

<div class="pin-card azul" id="Azul" onclick="abrirModal('Azul')">
<h3>Azul</h3>
<span class="estado">LIBRE</span>
</div>

<div class="pin-card verde" id="Verde" onclick="abrirModal('Verde')">
<h3>Verde</h3>
<span class="estado">LIBRE</span>
</div>

<div class="pin-card amarillo" id="Amarillo" onclick="abrirModal('Amarillo')">
<h3>Amarillo</h3>
<span class="estado">LIBRE</span>
</div>

<div class="pin-card blanco" id="Blanco" onclick="abrirModal('Blanco')">
<h3>Blanco</h3>
<span class="estado">LIBRE</span>
</div>

<div class="pin-card negro" id="Negro" onclick="abrirModal('Negro')">
<h3>Negro</h3>
<span class="estado">LIBRE</span>
</div>

<div class="pin-card naranja" id="Naranja" onclick="abrirModal('Naranja')">
<h3>Naranja</h3>
<span class="estado">LIBRE</span>
</div>

<div class="pin-card morado" id="Morado" onclick="abrirModal('Morado')">
<h3>Morado</h3>
<span class="estado">LIBRE</span>
</div>

</div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalLote" tabindex="-1">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title" id="tituloPin"></h5>
<button type="button" class="btn-close" data-bs-dismiss="modal"></button>
</div>
<div class="modal-body">

<form id="formLote">

<div class="mb-3">
<label>PIN Operario</label>
<input type="password" id="operarioPin" class="form-control" required>
</div>

<div class="mb-3">
<label>Producto</label>
<select id="prodId" class="form-select">
<option value="BRIO-MINI-A">Pan Brioche Mini</option>
</select>
</div>

<button type="submit" class="btn btn-primary w-100">
INICIAR MOJADO
</button>

</form>

</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzQO295YoshhzK24rsucjWfOJE6wxzCJB-69GqT0IqdxvxaiY1chfK4AUrHK_P5qidx/exec";

let colorActivo = "";
let modal = new bootstrap.Modal(document.getElementById('modalLote'));

function abrirModal(color){
colorActivo = color;
document.getElementById('tituloPin').innerText = "Pin " + color + " - Nuevo Lote";
modal.show();
}

document.getElementById('formLote').addEventListener('submit', async function(e){

e.preventDefault();

const pin = document.getElementById('operarioPin').value;

const data = {
action: "INICIAR_MOJADO",
pin: pin,
color_pin: colorActivo,
producto_id: "BRIO-MINI-A",
empaque: "Flowpack",
fecha_venc: "2026-03-15"
};

try {

const res = await fetch(API_URL, {
method: 'POST',
headers: { "Content-Type": "application/json" },
body: JSON.stringify(data)
});

const result = await res.json();

if(result.status === "ok"){

alert("Lote creado: " + result.id_lote_unico);

document.getElementById(colorActivo).classList.add("ocupado");
document.querySelector("#"+colorActivo+" .estado").innerText = "OCUPADO";

modal.hide();

} else {
alert(result.message);
}

} catch(error){
alert("Error de conexión con el servidor.");
console.error(error);
}

});

</script>

</body>
</html>
