<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVITO MES | Trazabilidad MP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', sans-serif; }
        .panel-box { background: rgba(255,255,255,0.05); border-radius: 20px; padding: 25px; }
        .lote-card { width: 140px; height: 140px; border-radius: 15px; background: rgba(255,255,255,0.1); cursor: pointer; display: flex; flex-direction: column; justify-content: center; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        .modal-content { background: #0f172a; border-radius: 20px; border: 1px solid #38bdf8; }
        .form-section { background: rgba(56, 189, 248, 0.1); padding: 15px; border-radius: 10px; margin-top: 15px; }
        label { font-size: 0.8rem; color: #38bdf8; }
    </style>
</head>
<body>

<div class="container mt-5">
    <div class="panel-box">
        <h4 class="text-center mb-4">SISTEMA DE MOJADO - LEVITO</h4>
        <div id="contenedorLotes" class="d-flex flex-wrap gap-3 justify-content-center"></div>
    </div>
</div>

<div class="modal fade" id="modalLote">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="tituloLote">Registro de Mojado</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formLote">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label>PIN Operario</label>
                            <input type="password" id="operarioPin" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label>Producto</label>
                            <select id="productoId" class="form-select">
                                <option value="BRIO-MINI-A">Pan Brioche Mini</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-section">
                        <h6>Trazabilidad de Materia Prima</h6>
                        <div class="row">
                            <div class="col-md-6 mb-2">
                                <label>Lote HARINA</label>
                                <input type="text" id="lote_harina" class="form-control form-control-sm" placeholder="Ej: H-9982" required>
                            </div>
                            <div class="col-md-6 mb-2">
                                <label>Vence HARINA</label>
                                <input type="date" id="vence_harina" class="form-control form-control-sm" required>
                            </div>
                            <div class="col-md-6">
                                <label>Lote LEVADURA</label>
                                <input type="text" id="lote_levadura" class="form-control form-control-sm" placeholder="Ej: L-443" required>
                            </div>
                            <div class="col-md-6">
                                <label>Vence LEVADURA</label>
                                <input type="date" id="vence_levadura" class="form-control form-control-sm" required>
                            </div>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-4">INICIAR MOJADO Y GUARDAR MP</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbxzwEIGecOp_bo-1PdzEqrrcPmLXiZwpC0y6QEuSKjb7JmjIMggoObhw3NSshCIC02b/exec";
    let modal;
    let loteSeleccionado = "";

    document.addEventListener("DOMContentLoaded", function() {
        modal = new bootstrap.Modal(document.getElementById('modalLote'));
        const contenedor = document.getElementById("contenedorLotes");
        for (let i = 1; i <= 8; i++) {
            contenedor.innerHTML += `<div class="lote-card" onclick="abrirModal('LOTE_${i}')"><b>LOTE ${i}</b><small>Libre</small></div>`;
        }
    });

    function abrirModal(lote) {
        loteSeleccionado = lote;
        document.getElementById("tituloLote").innerText = "Registro Mojado: " + lote;
        modal.show();
    }

    document.getElementById("formLote").addEventListener("submit", async function(e) {
        e.preventDefault();
        
        const payload = {
            action: "INICIAR_MOJADO",
            pin: document.getElementById("operarioPin").value,
            color_pin: loteSeleccionado,
            producto_id: document.getElementById("productoId").value,
            materias_primas: {
                harina: { lote: document.getElementById("lote_harina").value, vence: document.getElementById("vence_harina").value },
                levadura: { lote: document.getElementById("lote_levadura").value, vence: document.getElementById("vence_levadura").value }
            }
        };

        try {
            const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
            const result = await res.json();
            if(result.status === "ok") {
                alert("Lote e Ingredientes Guardados correctamente.");
                modal.hide();
                location.reload();
            } else { alert(result.message); }
        } catch (error) { alert("Error al guardar. Verifique conexión."); }
    });
</script>
</body>
</html>
