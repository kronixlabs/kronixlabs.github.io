<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LEVITO MES | Kronix Labs</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
background: radial-gradient(circle at 20% 20%, #0f172a, #020617 70%);
font-family: 'Segoe UI', sans-serif;
color: white;
}

/* NAVBAR */
.navbar {
background: rgba(255,255,255,0.05);
backdrop-filter: blur(10px);
padding: 15px 30px;
border-bottom: 1px solid rgba(255,255,255,0.1);
}

.brand-title {
font-weight: 600;
letter-spacing: 1px;
color: #38bdf8;
}

.estado-conexion {
font-size: 12px;
opacity: 0.7;
}

/* PANEL */
.panel-box {
background: rgba(255,255,255,0.04);
border-radius: 20px;
padding: 30px;
box-shadow: 0 0 40px rgba(0,0,0,0.4);
}

/* LOTES */
.lote-card {
width: 150px;
height: 160px;
border-radius: 20px;
background: rgba(255,255,255,0.05);
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
cursor: pointer;
transition: .3s;
border: 1px solid rgba(255,255,255,0.08);
}

.lote-card:hover {
background: rgba(255,255,255,0.1);
transform: translateY(-4px);
}

.indicador {
width: 18px;
height: 18px;
border-radius: 50%;
margin-bottom: 8px;
}

.gris { background: #64748b; }
.verde { background: #22c55e; }

.lote-num {
font-size: 16px;
font-weight: 600;
}

.etapa-texto {
font-size: 12px;
opacity: .8;
text-align: center;
margin-top: 4px;
}

.operario-texto {
font-size: 11px;
opacity: .6;
text-align: center;
}

/* MODAL */
.modal-content {
background: #0f172a;
color: white;
border-radius: 20px;
}

.btn-primary {
background: linear-gradient(90deg,#2563eb,#38bdf8);
border: none;
}
</style>
</head>

<body>

<nav class="navbar d-flex justify-content-between align-items-center">
<div class="brand-title">KRONIX LABS • LEVITO MES</div>
<div id="estadoConexion" class="estado-conexion">Conectando...</div>
</nav>

<div class="container mt-5">
<div class="panel-box">

<h5 class="mb-4">Panel Operativo de Lotes</h5>

<div id="contenedorLotes" class="d-flex flex-wrap gap-4 justify-content-center"></div>

</div>
</div>

<!-- MODAL -->
<div class="modal fade" id="modalLote">
<div class="modal-dialog">
<div class="modal-content">
<div class="modal-header">
<h5 class="modal-title" id="tituloLote"></h5>
<button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
</div>

<div class="modal-body">
<form id="formLote">

<div class="mb-3">
<label>Producto</label>
<select class="form-select">
<option value="BRIO-MINI-A">Pan Brioche Mini</option>
</select>
</div>

<div class="mb-3">
<label>PIN Operario</label>
<input type="password" id="operarioPin" class="form-control" required>
</div>

<button type="submit" class="btn btn-primary w-100">
INICIAR PROCESO
</button>

</form>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycby_xhYp-nvEJEQJN4xEZyvdmfo2KVrC-zEgfhsfX_VZPyaZgH0x1vAfUEosiJQQsWpi/exec";

let modal;
let loteSeleccionado = "";

document.addEventListener("DOMContentLoaded", function(){
modal = new bootstrap.Modal(document.getElementById('modalLote'));
dibujarBase();
cargarEstados();
setInterval(cargarEstados, 5000);
});

function dibujarBase() {
const contenedor = document.getElementById("contenedorLotes");
contenedor.innerHTML = "";

for (let i = 1; i <= 7; i++) {
contenedor.innerHTML += `
<div class="lote-card" onclick="abrirModal('LOTE_${i}')">
<div class="indicador gris"></div>
<div class="lote-num">LOTE ${i}</div>
<div class="etapa-texto">No iniciado</div>
<div class="operario-texto"></div>
</div>
`;
}
}

function abrirModal(lote) {
loteSeleccionado = lote;
document.getElementById("tituloLote").innerText = lote.replace("_"," ");
modal.show();
}

document.getElementById("formLote").addEventListener("submit", async function(e){

e.preventDefault();

const pin = document.getElementById("operarioPin").value;

try {

const res = await fetch(API_URL, {
method: "POST",
body: JSON.stringify({
action: "INICIAR_MOJADO",
pin: pin,
color_pin: loteSeleccionado,
producto_id: "BRIO-MINI-A",
empaque: "Flowpack",
fecha_venc: "2026-03-15"
})
});

const result = await res.json();

if(result.status === "ok"){
modal.hide();
cargarEstados();
} else {
alert(result.message);
}

} catch (error) {
alert("Error de conexión con el servidor.");
console.error(error);
}

});

async function cargarEstados() {

try {

const res = await fetch(API_URL);
const data = await res.json();

document.getElementById("estadoConexion").innerText = "Conectado ✓";

const cards = document.querySelectorAll(".lote-card");

cards.forEach(card=>{
card.querySelector(".indicador").className = "indicador gris";
card.querySelector(".etapa-texto").innerText = "No iniciado";
card.querySelector(".operario-texto").innerText = "";
});

data.forEach(info => {

const match = info.lote.match(/LOTE_(\d+)/);
if (!match) return;

const index = match[1] - 1;

cards[index].querySelector(".indicador").className = "indicador verde";
cards[index].querySelector(".etapa-texto").innerText = info.etapa;
cards[index].querySelector(".operario-texto").innerText = info.responsable;

});

} catch (error) {
document.getElementById("estadoConexion").innerText = "Sin conexión";
console.error(error);
}

}

</script>

</body>
</html>
