<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Levito | Sistema MES</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
    background: radial-gradient(circle at 20% 20%, #1f1f3a, #0d0d1a 60%);
    font-family: 'Segoe UI', sans-serif;
    color: white;
}

.navbar {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(10px);
}

.nav-link {
    color: rgba(255,255,255,0.6);
    cursor:pointer;
}

.nav-link.active {
    color:#00f2fe !important;
    font-weight:600;
}

.section { display:none; padding:30px; }
.section.active { display:block; }

.panel-box {
    background: rgba(255,255,255,0.05);
    border-radius:20px;
    padding:25px;
}

/* LOTES */
.lote-mini {
    width:120px;
    height:135px;
    border-radius:15px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    background:rgba(255,255,255,0.05);
    transition:.3s;
}

.lote-mini:hover {
    background:rgba(255,255,255,0.1);
}

.indicador {
    width:18px;
    height:18px;
    border-radius:50%;
    margin-bottom:6px;
}

.gris { background:#7f8c8d; }
.verde { background:#27ae60; }

.lote-num {
    font-weight:600;
    font-size:15px;
}

.etapa-texto {
    font-size:11px;
    opacity:.7;
}

.operario-texto {
    font-size:10px;
    opacity:.5;
}

/* SEMÁFORO GENERAL */
.semaforo-card {
    height:120px;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:600;
}

.modal-content {
    background:#111124;
    color:white;
    border-radius:20px;
}

.loader { display:none; font-size:13px; opacity:.6; }

.btn-primary {
    background: linear-gradient(90deg,#4facfe,#00f2fe);
    border:none;
}
</style>
</head>

<body>

<nav class="navbar navbar-expand-lg px-4">
<span class="navbar-brand text-white">LEVITO MES</span>

<ul class="navbar-nav ms-auto">
<li class="nav-item">
<span class="nav-link active" onclick="cambiarSeccion('produccion', this)">Producción</span>
</li>
<li class="nav-item">
<span class="nav-link" onclick="cambiarSeccion('despacho', this)">Despacho</span>
</li>
<li class="nav-item">
<span class="nav-link" onclick="cambiarSeccion('entrega', this)">Entrega</span>
</li>
<li class="nav-item">
<span class="nav-link" onclick="cambiarSeccion('estado', this)">Estado</span>
</li>
</ul>
</nav>

<!-- PRODUCCIÓN -->
<div id="produccion" class="section active">
<div class="panel-box">
<h5 class="mb-4">Panel Operativo de Lotes</h5>
<div id="contenedorLotes" class="d-flex justify-content-between flex-wrap gap-3"></div>
</div>
</div>

<!-- DESPACHO -->
<div id="despacho" class="section">
<div class="panel-box">
<h5>Módulo de Despacho</h5>
<p>Contenido en desarrollo.</p>
</div>
</div>

<!-- ENTREGA -->
<div id="entrega" class="section">
<div class="panel-box">
<h5>Módulo de Entrega</h5>
<p>Contenido en desarrollo.</p>
</div>
</div>

<!-- ESTADO GENERAL -->
<div id="estado" class="section">
<div class="panel-box">
<h5>Estado General de Lotes</h5>
<div id="estadoSemaforo" class="row mt-3"></div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbzV368Wdxn16Ynn7NL9CNO18GPOyrZ6RZukPBI
5mAKD6UQDd-ALnGQu9dfXpbFJKyI4/exec";

function cambiarSeccion(id, element){
document.querySelectorAll(".section").forEach(sec=>sec.classList.remove("active"));
document.getElementById(id).classList.add("active");

document.querySelectorAll(".nav-link").forEach(link=>link.classList.remove("active"));
element.classList.add("active");
}

async function cargarEstados(){

try {

const res = await fetch(API_URL);
const data = await res.json();

const contenedor = document.getElementById("contenedorLotes");
const estadoGeneral = document.getElementById("estadoSemaforo");

contenedor.innerHTML = "";
estadoGeneral.innerHTML = "";

const totalLotes = 7;

for(let i=1; i<=totalLotes; i++){

const loteNombre = "LOTE_" + i;

const info = data.find(d => d.lote.includes(loteNombre));

let color = "gris";
let etapa = "No iniciado";
let operario = "";

if(info){
color = "verde";
etapa = info.etapa;
operario = info.responsable || "";
}

contenedor.innerHTML += `
<div class="lote-mini">
<div class="indicador ${color}"></div>
<div class="lote-num">L${i}</div>
<div class="etapa-texto">${etapa}</div>
<div class="operario-texto">${operario}</div>
</div>
`;

estadoGeneral.innerHTML += `
<div class="col-md-3 mb-3">
<div class="semaforo-card ${color}">
L${i}<br>${etapa}
</div>
</div>
`;

}

} catch(error){
console.error("Error cargando estados:", error);
}

}

document.addEventListener("DOMContentLoaded", function(){
cargarEstados();
setInterval(cargarEstados, 5000);
});

</script>

</body>
</html>
