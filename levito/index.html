<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVITO MES SYSTEM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #020617; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .lote-card { width: 170px; height: 190px; border: 1px solid #1e293b; border-radius: 20px; background: #0f172a; cursor: pointer; transition: 0.3s; padding: 15px; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .lote-card.activo { border-color: #22c55e; background: #064e3b; box-shadow: 0 0 15px rgba(34, 197, 94, 0.3); }
        .indicador { width: 12px; height: 12px; border-radius: 50%; margin-bottom: 10px; }
        .gris { background: #64748b; } .verde { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .modal-content { background: #0f172a; border: 1px solid #38bdf8; border-radius: 25px; }
        .form-control, .form-select { background: #1e293b; color: white; border: 1px solid #334155; }
        .form-control:focus { background: #1e293b; color: white; border-color: #38bdf8; }
        .table-dark { --bs-table-bg: #000; }
        .btn-calc { background: #38bdf8; color: #000; font-weight: bold; }
    </style>
</head>
<body class="p-4">

<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-5">
        <h2 class="text-info fw-bold">LEVITO MES <small class="text-white fs-6">v9.0</small></h2>
        <div id="status" class="badge bg-secondary">Conectando...</div>
    </div>

    <div id="panel" class="d-flex flex-wrap gap-4 justify-content-center">
        </div>
</div>

<div class="modal fade" id="modalMES" tabindex="-1" data-bs-backdrop="static">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title" id="mTitle">Control de Proceso</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="mesForm">
                    <div id="faseInicio" class="d-none">
                        <div class="row g-3 mb-4">
                            <div class="col-md-4"><label class="small">PIN Operario</label><input type="password" id="pin" class="form-control" required></div>
                            <div class="col-md-5"><label class="small">Producto</label><select id="prodId" class="form-select"><option value="0903-1">BRIOCHE MINI (0903-1)</option></select></div>
                            <div class="col-md-3"><label class="small">Cant. Producir</label><input type="number" id="cant" class="form-control" value="1" min="1"></div>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-md-6"><label class="small text-info">Temp. Ambiente (°C)</label><input type="number" id="temp" class="form-control" placeholder="Ej: 24"></div>
                            <div class="col-md-6"><label class="small text-info">Humedad (%)</label><input type="number" id="hum" class="form-control" placeholder="Ej: 60"></div>
                        </div>
                        <button type="button" class="btn btn-calc w-100 mb-4" onclick="obtenerFormula()">CALCULAR E INICIAR MOJADO</button>
                        
                        <div id="tablaArea" class="d-none">
                            <table class="table table-dark table-hover table-sm small">
                                <thead><tr><th>Ingrediente / Peso</th><th>Lote MP</th><th>Vencimiento</th></tr></thead>
                                <tbody id="tbodyFormula"></tbody>
                                <tfoot class="table-primary text-dark"><tr><td colspan="3" id="tMasa" class="fw-bold px-2">TOTAL MASA: 0 g</td></tr></tfoot>
                            </table>
                        </div>
                    </div>

                    <div id="faseAvance" class="d-none text-center">
                        <h4 id="labelActual" class="text-success"></h4>
                        <div class="py-2 opacity-50">Siguiente etapa:</div>
                        <h3 id="labelProxima" class="text-info mb-4"></h3>
                        
                        <div id="camposExtras" class="text-start bg-dark p-3 rounded mb-3">
                            </div>
                        
                        <input type="password" id="pinAvance" class="form-control text-center mx-auto" style="max-width:250px" placeholder="PIN CONFIRMACIÓN" required>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 mt-4 p-3 fw-bold" id="btnSubmit" disabled>CONFIRMAR REGISTRO</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const API = "https://script.google.com/macros/s/AKfycbwNhSJWe5ZyTbqG_JPTNqtF6GmsZiCgLU4owjlutycLEDC3JhDRCr4q8vGVkAswC8iU/exec"; // REEMPLAZA AQUÍ
    let modal, loteSel, infoSel, masaTotal = 0;
    const etapas = ["Mojado", "Levado", "Horneo", "Empaque", "Finalizado"];

    window.onload = () => {
        modal = new bootstrap.Modal(document.getElementById('modalMES'));
        cargarPines();
        setInterval(cargarPines, 20000);
    };

    async function cargarPines() {
        try {
            const res = await fetch(`${API}?action=GET_ALL_ACTIVOS`);
            const activos = await res.json();
            const panel = document.getElementById("panel");
            panel.innerHTML = "";
            for(let i=1; i<=8; i++){
                const id = `LOTE_${i}`;
                const act = activos.find(a => a.id_lote_pin === id);
                panel.innerHTML += `
                    <div class="lote-card ${act?'activo':''}" onclick="abrirControl('${id}', ${act?JSON.stringify(act).replace(/"/g,'&quot;'):'null'})">
                        <div class="indicador ${act?'verde':'gris'}"></div>
                        <div class="fw-bold">${id.replace('_',' ')}</div>
                        <div class="small ${act?'text-info':'text-secondary'}">${act?act.etapa_actual:'LIBRE'}</div>
                        ${act?`<div style="font-size:11px; color:#fbbf24; margin-top:10px">${act.responsable}</div><div style="font-size:9px; opacity:0.6">${act.hora_inicio}</div>`:''}
                    </div>`;
            }
            document.getElementById("status").innerText = "Sincronizado ✓";
            document.getElementById("status").className = "badge bg-success";
        } catch(e) { document.getElementById("status").innerText = "Error de red"; }
    }

    function abrirControl(id, info) {
        loteSel = id; infoSel = info;
        document.getElementById("faseInicio").classList.add("d-none");
        document.getElementById("faseAvance").classList.add("d-none");
        document.getElementById("tablaArea").classList.add("d-none");
        document.getElementById("btnSubmit").disabled = (info === null);

        if(!info) {
            document.getElementById("faseInicio").classList.remove("d-none");
            document.getElementById("mTitle").innerText = "Iniciar " + id;
        } else {
            document.getElementById("faseAvance").classList.remove("d-none");
            const idx = etapas.indexOf(info.etapa_actual);
            const prox = etapas[idx+1];
            document.getElementById("labelActual").innerText = info.etapa_actual;
            document.getElementById("labelProxima").innerText = prox;
            document.getElementById("mTitle").innerText = "Avance: " + info.id_lote_unico;
            document.getElementById("btnSubmit").disabled = false;
            generarPreguntas(prox);
        }
        modal.show();
    }

    async function obtenerFormula() {
        const prod = document.getElementById("prodId").value;
        const cant = document.getElementById("cant").value;
        const res = await fetch(`${API}?action=GET_FORMULA&producto_id=${prod}`);
        const data = await res.json();
        
        const tbody = document.getElementById("tbodyFormula");
        tbody.innerHTML = ""; masaTotal = 0;
        
        data.forEach(item => {
            const peso = item.cantidad_base * cant;
            masaTotal += peso;
            tbody.innerHTML += `
                <tr>
                    <td>${item.ingrediente}<br><span class="badge bg-secondary">${peso}g</span></td>
                    <td><input type="text" class="form-control form-control-sm mp-lote" data-ing="${item.ingrediente}" required></td>
                    <td><input type="date" class="form-control form-control-sm mp-vence" required></td>
                </tr>`;
        });
        document.getElementById("tMasa").innerText = `TOTAL MASA: ${masaTotal.toLocaleString()} g`;
        document.getElementById("tablaArea").classList.remove("d-none");
        document.getElementById("btnSubmit").disabled = false;
    }

    function generarPreguntas(etapa) {
        const div = document.getElementById("camposExtras");
        div.innerHTML = "";
        if(etapa === "Levado") div.innerHTML = `<label class="small">Cámara de Crecimiento</label><select id="extra_1" class="form-select"><option>Cámara 1</option><option>Cámara 2</option></select>`;
        if(etapa === "Horneo") div.innerHTML = `<label class="small">Temperatura Real Horno (°C)</label><input type="number" id="extra_1" class="form-control" required>`;
        if(etapa === "Empaque") div.innerHTML = `<label class="small">Unidades Finales Producidas</label><input type="number" id="extra_1" class="form-control" required>`;
    }

    document.getElementById("mesForm").onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById("btnSubmit");
        btn.disabled = true; btn.innerText = "Registrando...";

        let payload = { color_pin: loteSel };
        if(!infoSel) {
            payload.action = "INICIAR_MOJADO";
            payload.pin = document.getElementById("pin").value;
            payload.producto_id = document.getElementById("prodId").value;
            payload.temp = document.getElementById("temp").value;
            payload.humedad = document.getElementById("hum").value;
            payload.total_masa = masaTotal;
            payload.materias_primas = {};
            document.querySelectorAll(".mp-lote").forEach((el, i) => {
                payload.materias_primas[el.dataset.ing] = { lote: el.value, vence: document.querySelectorAll(".mp-vence")[i].value };
            });
        } else {
            payload.action = "AVANZAR_ETAPA";
            payload.pin = document.getElementById("pinAvance").value;
            payload.id_lote_unico = infoSel.id_lote_unico;
            payload.proxima_etapa = etapas[etapas.indexOf(infoSel.etapa_actual) + 1];
            payload.datos_etapa = { val: document.getElementById("extra_1")?.value || "" };
        }

        const res = await fetch(API, { method: "POST", body: JSON.stringify(payload) });
        const r = await res.json();
        if(r.status === "ok") { modal.hide(); cargarPines(); } else { alert(r.message); }
        btn.disabled = false; btn.innerText = "CONFIRMAR REGISTRO";
    };
</script>
</body>
</html>
