<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVITO MES | Kronix Labs</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: radial-gradient(circle at 20% 20%, #0f172a, #020617 70%); color: white; font-family: 'Segoe UI', sans-serif; min-height: 100vh; }
        .navbar { background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255,255,255,0.1); padding: 15px 30px; }
        .brand-title { font-weight: 600; color: #38bdf8; letter-spacing: 1px; }
        
        /* TARJETAS DE LOTE */
        .lote-card {
            width: 170px; height: 190px; border-radius: 20px; background: rgba(255,255,255,0.05);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer; transition: .3s; border: 1px solid rgba(255,255,255,0.1); text-align: center; padding: 10px;
        }
        .lote-card.activo { border-color: #22c55e; background: rgba(34, 197, 94, 0.15); box-shadow: 0 0 15px rgba(34, 197, 94, 0.2); }
        .indicador { width: 12px; height: 12px; border-radius: 50%; margin-bottom: 10px; }
        .gris { background: #64748b; }
        .verde { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        
        .ope-name { font-size: 0.75rem; font-weight: bold; color: #38bdf8; margin-top: 5px; }
        .hora-text { font-size: 0.65rem; opacity: 0.7; }

        /* MODAL */
        .modal-content { background: #0f172a; border: 1px solid #38bdf8; border-radius: 20px; color: white; }
        .form-control, .form-select { background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2); color: white; }
        .form-control:focus { background: rgba(255,255,255,0.15); color: white; border-color: #38bdf8; box-shadow: none; }
        
        /* TABLA DE FORMULA */
        .tabla-calculos { width: 100%; margin-top: 20px; border-collapse: separate; border-spacing: 0 8px; }
        .tabla-calculos th { font-size: 0.7rem; color: #38bdf8; text-transform: uppercase; padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .tabla-calculos td { padding: 10px; background: rgba(255,255,255,0.03); }
        .scroll-area { max-height: 350px; overflow-y: auto; border-radius: 10px; padding: 5px; }
        
        .btn-calc { background: #38bdf8; color: #000; font-weight: bold; border: none; }
        .btn-calc:hover { background: #7dd3fc; }
        .btn-confirmar { background: linear-gradient(90deg, #22c55e, #16a34a); border: none; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar d-flex justify-content-between align-items-center">
    <div class="brand-title">KRONIX LABS • LEVITO MES</div>
    <div id="status" class="small opacity-50">Sincronizando...</div>
</nav>

<div class="container mt-5">
    <div id="contenedorLotes" class="d-flex flex-wrap gap-4 justify-content-center">
        </div>
</div>

<div class="modal fade" id="modalLote" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="tituloModal">Control de Proceso</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formAccion">
                    
                    <div id="seccionInicial">
                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="small fw-bold">PIN Operario</label>
                                <input type="password" id="pin" class="form-control" placeholder="****" required>
                            </div>
                            <div class="col-md-5">
                                <label class="small fw-bold">Producto a Iniciar</label>
                                <select id="productoId" class="form-select">
                                    <option value="0903-1">PAN BRIOCHE MINI (0903-1)</option>
                                </select>
                            </div>
                            <div class="col-md-3">
                                <label class="small fw-bold">Cant. a Producir</label>
                                <input type="number" id="cantProduccion" class="form-control" value="1" min="1">
                            </div>
                        </div>
                        <button type="button" class="btn btn-calc w-100 mt-3 p-2" onclick="generarCalculos()">
                            EMPEZAR PROCESO DE MOJADO (CALCULAR)
                        </button>
                    </div>

                    <div id="seccionCalculos" class="d-none mt-4">
                        <h6 class="text-info small border-bottom pb-2">HOJA DE PESAJE Y TRAZABILIDAD</h6>
                        <div class="scroll-area">
                            <table class="tabla-calculos">
                                <thead>
                                    <tr>
                                        <th>Ingrediente / Cantidad</th>
                                        <th>Lote Materia Prima</th>
                                        <th>Vencimiento</th>
                                    </tr>
                                </thead>
                                <tbody id="cuerpoTabla">
                                    </tbody>
                            </table>
                        </div>
                        <button type="submit" class="btn btn-confirmar w-100 mt-3 p-3">GUARDAR E INICIAR LOTE</button>
                    </div>

                    <div id="seccionAvance" class="d-none text-center p-4">
                        <h4 id="txtEtapa" class="text-success"></h4>
                        <div class="my-3">⬇ PROXIMO PASO ⬇</div>
                        <h5 id="txtSiguiente" class="text-info"></h5>
                        <input type="password" id="pinAvance" class="form-control mt-4 text-center" placeholder="PIN CONFIRMACIÓN">
                        <button type="submit" class="btn btn-primary w-100 mt-3 p-3">CONFIRMAR AVANCE</button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const API_URL = "TU_URL_DE_APPS_SCRIPT"; // REEMPLAZAR CON TU URL
    let modal, loteSel, infoActiva;
    const etapas = ["Mojado", "Levado", "Horneo", "Empaque", "Finalizado"];

    document.addEventListener("DOMContentLoaded", () => {
        modal = new bootstrap.Modal(document.getElementById('modalLote'));
        cargarPanel();
        setInterval(cargarPanel, 15000);
    });

    async function cargarPanel() {
        try {
            const res = await fetch(`${API_URL}?action=GET_ALL_ACTIVOS`);
            const activos = await res.json();
            const cont = document.getElementById("contenedorLotes");
            cont.innerHTML = "";

            for (let i = 1; i <= 8; i++) {
                const idPin = `LOTE_${i}`;
                const info = activos.find(a => a.id_lote_pin === idPin);
                
                cont.innerHTML += `
                    <div class="lote-card ${info ? 'activo' : ''}" onclick="abrirModal('${idPin}', ${info ? JSON.stringify(info).replace(/"/g, '&quot;') : 'null'})">
                        <div class="indicador ${info ? 'verde' : 'gris'}"></div>
                        <div class="fw-bold">${idPin.replace('_',' ')}</div>
                        <div class="small opacity-75">${info ? info.etapa_actual : 'LIBRE'}</div>
                        ${info ? `<div class="ope-name">${info.responsable}</div><div class="hora-text">Inicio: ${info.hora_inicio}</div>` : ''}
                    </div>`;
            }
            document.getElementById("status").innerText = "Sincronizado ✓";
        } catch (e) { document.getElementById("status").innerText = "Error conexión"; }
    }

    function abrirModal(idPin, info) {
        loteSel = idPin;
        infoActiva = info;
        
        // Reset de secciones
        document.getElementById("seccionInicial").classList.add("d-none");
        document.getElementById("seccionCalculos").classList.add("d-none");
        document.getElementById("seccionAvance").classList.add("d-none");

        if (!info) {
            document.getElementById("seccionInicial").classList.remove("d-none");
            document.getElementById("tituloModal").innerText = "Nuevo Proceso - " + idPin;
        } else {
            document.getElementById("seccionAvance").classList.remove("d-none");
            document.getElementById("txtEtapa").innerText = info.etapa_actual;
            const prox = etapas[etapas.indexOf(info.etapa_actual) + 1];
            document.getElementById("txtSiguiente").innerText = prox;
            document.getElementById("tituloModal").innerText = "Avanzar Lote: " + info.id_lote_unico;
        }
        modal.show();
    }

    async function generarCalculos() {
        const prodId = document.getElementById("productoId").value;
        const cant = document.getElementById("cantProduccion").value;
        
        const res = await fetch(`${API_URL}?action=GET_FORMULA&producto_id=${prodId}`);
        const formula = await res.json();
        
        const cuerpo = document.getElementById("cuerpoTabla");
        cuerpo.innerHTML = "";

        formula.forEach(item => {
            const pesoCalc = (item.cantidad_base * cant).toLocaleString();
            cuerpo.innerHTML += `
                <tr>
                    <td>
                        <span class="small fw-bold text-white">${item.ingrediente}</span><br>
                        <span class="badge bg-primary">${pesoCalc} g</span>
                    </td>
                    <td><input type="text" class="form-control form-control-sm mp-lote" data-ing="${item.ingrediente}" placeholder="Lote" required></td>
                    <td><input type="date" class="form-control form-control-sm mp-vence" required></td>
                </tr>`;
        });

        document.getElementById("seccionCalculos").classList.remove("d-none");
    }

    document.getElementById("formAccion").onsubmit = async (e) => {
        e.preventDefault();
        let payload = { color_pin: loteSel };

        if (!infoActiva) {
            payload.action = "INICIAR_MOJADO";
            payload.pin = document.getElementById("pin").value;
            payload.producto_id = document.getElementById("productoId").value;
            payload.materias_primas = {};
            document.querySelectorAll(".mp-lote").forEach((el, i) => {
                payload.materias_primas[el.dataset.ing] = { 
                    lote: el.value, 
                    vence: document.querySelectorAll(".mp-vence")[i].value 
                };
            });
        } else {
            payload.action = "AVANZAR_ETAPA";
            payload.pin = document.getElementById("pinAvance").value;
            payload.id_lote_unico = infoActiva.id_lote_unico;
            payload.proxima_etapa = etapas[etapas.indexOf(infoActiva.etapa_actual) + 1];
        }

        const res = await fetch(API_URL, { method: "POST", body: JSON.stringify(payload) });
        const r = await res.json();
        if (r.status === "ok") {
            modal.hide();
            cargarPanel();
        } else { alert(r.message); }
    };
</script>

</body>
</html>
